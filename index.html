<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Text Summarizer</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="ui/style.css">
  <!-- Alerts CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notiflix@3.2.7/dist/notiflix-3.2.7.min.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="#">Simple Text Summarizer</a>
      <button id="themeToggle" class="btn btn-hf float-end mb-3">Toggle Dark Mode</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card p-4">
          <h3 class="mb-3 text-center">Simple Text Summarizer</h3>
          <p class="text-muted text-center">Paste any text below and generate a concise summary directly in your browser.</p>
          <label for="inputText" class="form-label fw-bold">Choose Model</label>
          <select id="modelSelect" class="form-select mb-3">
            <option value="Xenova/t5-small">T5 Small (Fastest)</option>
            <option value="Xenova/pegasus-xsum-small">Pegasus XSum Small</option>
            <option value="Xenova/t5-base">T5 Base</option>
            <option value="Xenova/distilbart-cnn-6-6">DistilBART CNN 6-6</option>
            <option value="Xenova/bart-large-cnn">BART Large CNN</option>
        </select>
          <!-- Input -->
          <div class="mb-3">
            <label for="inputText" class="form-label fw-bold">Your Text</label>
            <textarea id="inputText" class="form-control" rows="8" placeholder="Paste your text here..."></textarea>
          </div>

          <!-- Button -->
          <div class="d-grid mb-3">
            <button id="summarizeBtn" class="btn btn-hf">Summarize</button>
          </div>

          <!-- Output -->
          <div class="mb-3">
            <label for="output" class="form-label fw-bold">Summary</label>
            <div id="output" class="form-control bg-light"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-body-tertiary text-center text-lg-start mt-auto">
  <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.05);">
    Ronald Gosso
  </div>
</footer>

  <!-- UI JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Animation JS -->
  <script src="https://cdn.jsdelivr.net/npm/notiflix@3.2.7/dist/notiflix-3.2.7.min.js"></script>

  <!-- Summarizer Logic -->
  <script type="module" src="app.js"></script>
</body>
</html>
