<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Text Summarizer</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="ui/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="#">💡 Simple Text Summarizer 💡</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card p-4">
          <h3 class="mb-3 text-center">AI-Powered Text Summarizer</h3>
          <p class="text-muted text-center">Paste any text below and generate a concise summary directly in your browser.</p>

          <!-- Input -->
          <div class="mb-3">
            <label for="inputText" class="form-label fw-bold">Your Text</label>
            <textarea id="inputText" class="form-control" rows="8" placeholder="Paste your text here..."></textarea>
          </div>

          <!-- Button -->
          <div class="d-grid mb-3">
            <button id="summarizeBtn" class="btn btn-hf">Summarize</button>
          </div>

          <!-- Status -->
          <p id="status" class="text-center text-muted">⏳ Model loading...</p>

          <!-- Output -->
          <div class="mb-3">
            <label for="output" class="form-label fw-bold">Summary</label>
            <div id="output" class="form-control bg-light"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
